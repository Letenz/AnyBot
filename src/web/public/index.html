<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/claude-agent-loop.css">
    <link rel="stylesheet" href="styles/change-review.css">
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-top">
        <div class="logo">
            <div class="logo-icon">Ab</div>
            <span class="logo-text">Any<span>Bot</span></span>
        </div>
        <button id="new-chat-btn" class="active">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            新对话
        </button>
        <button id="channels-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1.5 5h11M1.5 9h11M5 1.5l-1.5 11M10.5 1.5L9 12.5" stroke="currentColor" stroke-width="1.2"
                      stroke-linecap="round"/>
            </svg>
            频道
        </button>
        <button id="skills-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1L8.5 4.5L12.5 5L9.75 7.5L10.5 11.5L7 9.5L3.5 11.5L4.25 7.5L1.5 5L5.5 4.5L7 1Z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            技能
        </button>
        <button id="proxy-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1C4.24 1 2 3.24 2 6c0 1.86 1.02 3.49 2.53 4.35L4 12.5h6l-.53-2.15C10.98 9.49 12 7.86 12 6c0-2.76-2.24-5-5-5z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="7" cy="6" r="1.5" stroke="currentColor" stroke-width="1.1"/>
            </svg>
            代理
        </button>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-header">
            <button class="sidebar-label project-toggle" id="project-toggle" type="button" aria-expanded="true">
                <span>项目</span>
                <svg class="section-toggle-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                    <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="sidebar-icon-btn" id="add-project-btn" type="button" data-tooltip="添加项目" aria-label="添加项目">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                    <path d="M6.5 1.5v10M1.5 6.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="project-list" id="project-list"></div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-header">
            <button class="sidebar-label history-toggle" id="history-toggle" type="button" aria-expanded="true">
                <span>对话</span>
                <svg class="section-toggle-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                    <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="sidebar-icon-btn sidebar-header-action" id="add-history-chat-btn" type="button" data-tooltip="新对话" aria-label="新对话">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                    <path d="M6.5 1.5v10M1.5 6.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="history-list" id="history-list"></div>

    <div class="sidebar-footer">
        <div class="provider-switcher" id="provider-switcher">
            <div class="provider-dropdown" id="provider-dropdown"></div>
            <div class="provider-badge" id="provider-badge">
                <div class="model-dot" style="background:#5cb85c"></div>
                <span>提供商</span>
                <span class="provider-name" id="current-provider-name">加载中…</span>
                <svg class="provider-badge-arrow" viewBox="0 0 12 12" fill="none">
                    <path d="M3 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
        <div class="model-switcher" id="model-switcher">
            <div class="model-dropdown" id="model-dropdown"></div>
            <div class="model-badge" id="model-badge">
                <div class="model-dot"></div>
                <span>模型</span>
                <span class="model-name" id="current-model-name">加载中…</span>
                <svg class="model-badge-arrow" viewBox="0 0 12 12" fill="none">
                    <path d="M3 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>
</aside>

<main id="main">
    <div id="chat-view">
        <div id="messages">
            <div id="empty-state">
                <div class="empty-icon">Ab</div>
                <div class="empty-title">AnyBot 已就绪</div>
                <div class="empty-sub">发送消息，开始你的对话</div>
            </div>
        </div>

        <div id="input-area">
            <div id="attachment-preview" class="attachment-preview" style="display:none;"></div>
            <div class="input-wrapper">
                <input type="file" id="file-input" multiple hidden>
                <button id="attach-btn" class="attach-btn" title="添加附件">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M14 8.5l-5.5 5.5a3.5 3.5 0 01-5-5L9 3.5a2 2 0 013 3L6.5 12a.5.5 0 01-.7-.7L11 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <textarea id="chat-input" placeholder="发送消息... 可粘贴图片或拖拽文件" rows="1"></textarea>
                <div class="context-usage" id="context-usage" aria-label="上下文用量" tabindex="0">
                    <div class="context-usage-ring" id="context-usage-ring"></div>
                    <div class="context-usage-tooltip" id="context-usage-tooltip">
                        <div class="context-tooltip-title">背景信息窗口：</div>
                        <div><span id="context-usage-percent">0% 已用（剩余 100%）</span></div>
                        <div><span id="context-usage-tokens">已用 0 token，共 0</span></div>
                        <div class="context-tooltip-provider" id="context-usage-provider"></div>
                    </div>
                </div>
                <button id="send-btn" disabled>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2 7h10M7.5 2.5L12 7l-4.5 4.5" stroke="white" stroke-width="1.6" stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行 · 📎 附件 / 粘贴图片 / 拖拽文件</div>
            <div id="drop-overlay" class="drop-overlay" style="display:none;">
                <div class="drop-overlay-content">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <path d="M20 8v16M12 20l8 8 8-8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6 28v4a2 2 0 002 2h24a2 2 0 002-2v-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>松开以添加附件</span>
                </div>
            </div>
        </div>
    </div>

    <div id="channel-view" style="display:none;"></div>
    <div id="skills-view" style="display:none;"></div>
    <div id="proxy-view" style="display:none;"></div>
</main>

<script src="scripts/change-review.js"></script>
<script src="scripts/claude-agent-loop.js"></script>
<script src="scripts/app.js"></script>
</body>
</html>
