name: Build Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact-path: release-assets/AnyBot-Setup-*.exe
          - os: macos-latest
            platform: mac
            artifact-path: release-assets/AnyBot-mac-*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build release files
        run: npm run build:release

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Assemble portable package
        run: npm run package:portable

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          choco install innosetup --no-progress --yes
          $env:APP_VERSION = (Get-Content package.json | ConvertFrom-Json).version
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "installer\windows\AnyBot.iss"
          Get-ChildItem release-assets

      - name: Zip macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          dir="$(find .packaging -maxdepth 1 -type d -name 'AnyBot-mac-*' | head -n 1)"
          test -n "$dir"
          zip="release-assets/$(basename "$dir").zip"
          ditto -c -k --sequesterRsrc --keepParent "$dir" "$zip"
          ls -la release-assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyBot-${{ matrix.platform }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AnyBot ${{ github.ref_name }}
          body: |
            ## AnyBot Packages

            | 平台 | 文件 |
            |------|------|
            | macOS | `AnyBot-mac-*.zip` |
            | Windows | `AnyBot-Setup-*-x64.exe` |

            ### 使用说明
            - **macOS**：解压后双击 `start-anybot.command`，打开 `http://localhost:19981`。
            - **Windows**：运行 `AnyBot-Setup-*-x64.exe` 安装，安装后从开始菜单或桌面快捷方式启动。
            - 包内自带 AnyBot 运行用的 Node.js 22；Codex/Gemini/Claude/Cursor/Qoder 等 Provider CLI 仍需用户自行安装并登录。
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
