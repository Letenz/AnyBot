name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build-command: npm run electron:build:win
            artifact-path: |
              dist-electron/*.exe
              dist-electron/*.exe.blockmap
              dist-electron/latest.yml
          - os: macos-latest
            platform: mac
            build-command: npm run electron:build:mac
            artifact-path: dist-electron/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build desktop package
        run: ${{ matrix.build-command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyBot-${{ matrix.platform }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AnyBot ${{ github.ref_name }}
          body: |
            ## AnyBot Packages

            | 平台 | 文件 |
            |------|------|
            | macOS | `AnyBot-*.dmg` |
            | Windows | `AnyBot Setup *.exe` |

            ### 使用说明
            - **macOS**：打开 `.dmg` 后将 `AnyBot.app` 拖到 Applications，再双击启动。
            - **Windows**：运行 `AnyBot Setup *.exe` 安装，安装后从开始菜单或桌面快捷方式启动。
            - **Windows 自动更新**：Release 中的 `latest.yml` 和 `.exe.blockmap` 是应用内更新所需文件，请勿删除或重命名。
            - AnyBot 会以内嵌桌面窗口运行，不再额外打开浏览器；Codex/Gemini/Claude/Cursor/Qoder 等 Provider CLI 仍需用户自行安装并登录。
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
